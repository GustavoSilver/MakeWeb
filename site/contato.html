    <main class="flex-container" id="conteudo">
        <section>
            <h1>CONTATO</h1>
            <form action="" method="post">
                <fieldset>
                    <legend>Dados Pessoais</legend>

                    <label for="nome" class="required">Nome</label>
                    <input type="text" name="nome" id="nome" placeholder="Digite o seu nome completo" required>

                    <label for="cpf">CPF</label>
                    <input type="text" name="cpf" id="cpf" placeholder="Digite o seu CPF"
                    required>

                    <label for="data">Data de Nascimento</label>
                    <input type="date" name="data" id="data" required>

                    <label for="email">E-Mail</label>
                    <input type="email" name="email" id="email" placeholder="Digite o seu endereço de E-Mail" required>

                    <label for="telefone">Telefone</label>
                    <input type="tel" name="telefone" id="telefone" placeholder="Digite o seu número de telefone">
                </fieldset>
                <fieldset>
                    <legend>Endereço</legend>

                    <label for="cep">CEP</label>
                    <input type="text" name="cep" id="cep" placeholder="Digite o seu CEP" required>

                    <label for="rua">Rua</label>
                    <input type="text" name="rua" id="rua" disabled>

                    <label for="numero" class="required">Número</label>
                    <input type="number" name="numero" id="numero" required>

                    <label for="complemento">Complemento</label>
                    <input type="text" name="complemento" id="complemento">

                    <label for="bairro">Bairro</label>
                    <input type="text" name="bairro" id="bairro" disabled>

                    <label for="cidade">Cidade</label>
                    <input type="text" name="cidade" id="cidade" disabled>

                    <label for="estado">estado</label>
                    <input type="text" name="estado" id="estado" disabled>

                </fieldset>
                <fieldset>
                    <legend>Mensagem</legend>

                    <label for="assunto" class="required">Assunto</label>
                    <input type="text" name="assunto" id="assunto" placeholder="Digite o assunto da mensagem" required>

                    <label for="mensagem" class="required">Mensagem</label>
                    <textarea name="mensagem" id="mensagem" placeholder="Digite sua mensagem aqui..." required></textarea>
                </fieldset>
                <button type="submit">Enviar</button>
            </form>
        </section>
    </main>
    <footer class="flex-container" id = "rodape"><p>Todos os direitos reservados &copy; 2026</p></footer>
